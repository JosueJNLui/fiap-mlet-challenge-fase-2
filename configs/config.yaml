# Fonte única de hiperparâmetros do pipeline (lida pelo Pydantic Settings e,
# na Task 3, pelo dvc.yaml como `params`). Valores de ambiente/secret (MLflow,
# DagsHub token) ficam no .env e sobrepõem este arquivo.
seed: 42

paths:
  raw: data/raw
  processed: data/processed
  models: models

data:
  min_user_ratings: 20
  min_item_ratings: 20
  n_users_sample: 20000
  test_frac: 0.2

eval:
  like_threshold: 4.0
  ranking_n_users: 500
  ranking_item_batch: 2048

mlflow:
  experiment_name: MovieLens-Reco-Etapa2-Modelagem

models:
  bias:
    reg: 10.0
  svd:
    n_components: 50
    seed: 42
  bpr:
    emb_dim: 128
    lr: 0.005
    weight_decay: 1.0e-5
    n_neg: 10
    batch_size: 2048
    epochs: 40
    patience: 6
    val_users: 300
    like_threshold: 4.0
