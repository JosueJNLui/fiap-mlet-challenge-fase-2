services:
  train:
    build: .
    image: recsys:local
    env_file: .env                # fornece o DAGSHUB_TOKEN para o MLflow
    volumes:
      - ./data:/app/data          # raw (host, via make data-pull) + saída processed
      - ./models:/app/models      # artefatos treinados persistem no host
    command: >
      sh -c "python -m recsys.pipeline.preprocess &&
             python -m recsys.pipeline.feature_eng &&
             python -m recsys.pipeline.train &&
             python -m recsys.pipeline.evaluate"

  mlflow:
    build: .                      # mesma imagem do train (mlflow é dep de prod)
    image: recsys:local
    ports: ["5000:5000"]
    volumes:
      - mlflow-data:/app/mlruns
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////app/mlruns/mlflow.db
      --default-artifact-root /app/mlruns/artifacts

  api:                            # serving self-contained: só precisa de ./models
    build:
      context: .
      dockerfile: Dockerfile.api
    image: recsys-api:local
    ports: ["8000:8000"]
    env_file: .env                # creds DagsHub p/ carregar o modelo do Registry
    volumes:
      - ./models:/app/models      # bpr.pkl + serving.pkl (fallback local)
    command: uvicorn recsys.api.app:app --host 0.0.0.0 --port 8000

volumes:
  mlflow-data:
